<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advisor Brain DSS</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Advisor Brain DSS</h1>
      <p>Manual scenario engine for portfolio decision support.</p>
    </header>

    <section class="card">
      <h2>Input</h2>
      <form id="dssForm">
        <label>
          Interest Rates
          <input name="interestRates" type="number" step="0.1" value="6.5" />
        </label>

        <label>
          Liquidity
          <select name="liquidity">
            <option value="tight">Tight</option>
            <option value="neutral" selected>Neutral</option>
            <option value="easy">Easy</option>
          </select>
        </label>

        <label>
          Crude Price
          <input name="crude" type="number" step="0.1" value="80" />
        </label>

        <label>
          FII Flow
          <input name="fiiFlow" type="number" step="0.1" value="10" />
        </label>

        <label>
          Equity %
          <input name="equity" type="number" step="1" value="60" />
        </label>

        <label>
          Debt %
          <input name="debt" type="number" step="1" value="40" />
        </label>

        <button type="submit">Generate Recommendation</button>
      </form>
    </section>

    <section class="card" id="outputCard">
      <h2>Output</h2>
      <pre id="output">Submit the form to see the recommendation.</pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
